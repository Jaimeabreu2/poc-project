<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca de Laboratórios</title>
  <link rel="stylesheet" href="testepoc.css">
  <style>
    .filters {
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .filter-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 5px;
      background: #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    .filter-btn.active,
    .filter-btn:hover {
      background: #007bff;
      color: #fff;
    }
    .search-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 24px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
  </style>
</head>
<body>
  <main>
    <div class="search-container">
      <h1>Buscar Laboratórios</h1>
      <nav class="filters" aria-label="Filtrar por área">
        <button class="filter-btn active" data-area="todas" tabindex="0">Todas</button>
        <button class="filter-btn" data-area="ciências exatas e da terra" tabindex="0">Ciências Exatas e da Terra</button>
        <button class="filter-btn" data-area="ciências humanas" tabindex="0">Ciências Humanas</button>
        <button class="filter-btn" data-area="ciências biológicas" tabindex="0">Ciências Biológicas</button>
        <button class="filter-btn" data-area="ciências da saúde" tabindex="0">Ciências da Saúde</button>
        <button class="filter-btn" data-area="ciências agrárias" tabindex="0">Ciências Agrárias</button>
        <button class="filter-btn" data-area="ciências sociais aplicadas" tabindex="0">Ciências Sociais Aplicadas</button>
      </nav>
      <label for="search-bar" style="display:none;">Buscar laboratório</label>
      <input type="text" id="search-bar" placeholder="Digite o nome ou palavra-chave..." autocomplete="off" aria-label="Buscar laboratório">
      <ul id="results" aria-live="polite" style="max-height:none; overflow:visible;"></ul>
    </div>
    <noscript>
      <p style="color:red;text-align:center;">Este site requer JavaScript para funcionar corretamente.</p>
    </noscript>
  </main>
  <script src="TestePOC.js"></script>
</body>
</html>
