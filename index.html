<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca de Laboratórios</title>
  <link rel="stylesheet" href="testepoc.css">
  <style>
    .filters {
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .filter-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 5px;
      background: #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    .filter-btn.active,
    .filter-btn:hover {
      background: #007bff;
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Busca de Laboratórios</h1>
  </header>
  <div class="search-container">
    <div class="filters">
      <button class="filter-btn active" data-area="todas">Todas</button>
      <button class="filter-btn" data-area="ciências humanas">Ciências Humanas</button>
      <button class="filter-btn" data-area="ciências exatas e da terra">Ciências Exatas e da Terra</button>
      <button class="filter-btn" data-area="ciências biológicas">Ciências Biológicas</button>
      <button class="filter-btn" data-area="ciências da saúde">Ciências da Saúde</button>
      <button class="filter-btn" data-area="ciências agrárias">Ciências Agrárias</button>
      <button class="filter-btn" data-area="ciências sociais aplicadas">Ciências Sociais Aplicadas</button>
    </div>
    <input type="text" id="search-bar" placeholder="Digite o nome ou palavra-chave...">
    <!-- Adicione um elemento para mensagens de erro/aviso -->
    <div id="lab-erro" style="color:#b00;text-align:center;margin:10px 0 0 0;"></div>
    <ul id="results">
      <!-- Todos os laboratórios serão inseridos aqui pelo JS, sem limitação de quantidade pelo HTML/CSS -->
    </ul>
  </div>
  <script src="src/TestePOC.js?v=2"></script>
</body>
</html>
